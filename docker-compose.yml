services:
  ipsecalert:
    build: .
    image: ipsecalert:latest
    container_name: ipsecalert
    restart: unless-stopped
    env_file:
      - .env
    # Reachable only through Caddy on the internal compose network — never
    # published to the host.
    expose:
      - "8080"
    # Hardening: no privilege escalation, no Linux capabilities, read-only root
    # filesystem (the app writes nothing; /tmp is a tmpfs for gunicorn scratch).
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  caddy:
    image: caddy:2
    container_name: ipsecalert-caddy
    restart: unless-stopped
    depends_on:
      - ipsecalert
    ports:
      # Published on HOST_HTTPS_PORT (default 18443) to avoid clashing with other
      # services on this host (e.g. avss on 443). The container still serves HTTPS
      # on 443 internally. Bind to ONE interface via BIND_ADDR (recommended).
      - "${BIND_ADDR:-0.0.0.0}:${HOST_HTTPS_PORT:-18443}:443"
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-:443}
      - FORTIGATE_IPS=${FORTIGATE_IPS:-private_ranges}
      - TLS_DEFAULT_SNI=${TLS_DEFAULT_SNI:-fortiwebhook.gss.com.tw}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE      # required to bind :443 with all other caps dropped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # persists issued/self-signed certs across restarts
      - caddy_config:/config
      # Company GoDaddy wildcard cert, read-only (see certs/README.md).
      - ./certs:/certs:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  caddy_data:
  caddy_config:
