services:
  ipsecalert:
    build: .
    image: ipsecalert:latest
    container_name: ipsecalert
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # host:container — change the host port if 8080 is taken.
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
